model_path: null   # to be updated
train_path: coconut/data/prosqa_train.json
val_path: coconut/data/prosqa_valid.json
output_dir: outputs/layer{layer}/alpha{alpha}

# which transformer layer to hook into (0-indexed)
# start with the middle layer of gpt2 (layer 6 of 12)
layer: 6

# latent positions to test (1 = first thought, 5 = last thought for 5-hop samples)
latent_positions: [1, 2, 3, 4, 5]

# steering strength sweep
alpha_sweep: [5, 10, 20, 40]

# number of contrastive pairs to use when building steering vectors
n_contrast: 500