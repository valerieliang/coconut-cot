model_path:  /coconut-cot/checkpoints/prosqa-coconut/checkpoint_48
train_path:  /coconut-cot/coconut/data/prosqa_train.json
val_path:    /coconut-cot/coconut/data/prosqa_valid.json
output_dir:  /coconut-cot/steering/outputs

# GPT-2 small has 12 layers (0-11). Layer 6 = middle of the network.
layer: 6

# Latent positions to test (ProsQA uses 6 latent tokens; positions are 1-indexed)
latent_positions: [1, 2, 3, 4, 5]

# ── PHASE 1 (completed, vectors were noise) ──────────────────────────────────
# alpha_sweep: [5, 10, 20, 40]

# ── PHASE 2 (next run — rescaled after fixing vector extraction) ──────────────
# Effective steering requires alpha ~800-1200 (thought_norm / vec_norm ratio)
alpha_sweep: [100, 300, 600, 1200]

# Contrastive pairs for vector extraction
n_contrast: 500
